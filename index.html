<!DOCTYPE html>
<html>
<head>
    <title>My CI/CD Project</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.4);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #ff9800;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #e68900;
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 CI/CD Deployment Successful</h1>
    <p>This website is automatically deployed using Docker and GitHub Actions.</p>
    <button onclick="alert('Pipeline is working perfectly!')">Click Me</button>
    <footer>
        Deployed on AWS EC2 using Docker + GitHub Actions
    </footer>
</div>

</body>
</html>
